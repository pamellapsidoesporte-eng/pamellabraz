<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pamella Braz · Psicóloga Clínica e do Esporte</title>
<meta name="description" content="Psicóloga clínica e do esporte, abordagem EMDR. Atendimento online para atletas e não atletas.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%233a4a3d'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='%23d8c9a3' font-family='Georgia' font-style='italic'>p</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bruma:#ebe6dc;--pedra-escura:#1f2820;--verde-pedra:#3a4a3d;--salvia:#6a7d6d;--areia:#d8c9a3;--texto:#3a3a3a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bruma);color:var(--pedra-escura);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:32px}
.card{max-width:560px}
.selo{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--salvia);margin-bottom:22px}
h1{font-family:'Cormorant Garamond',serif;font-size:56px;font-weight:600;line-height:1.04;margin-bottom:14px}
.sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:var(--verde-pedra);margin-bottom:10px}
.crp{font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--salvia);margin-bottom:36px}
.btn{display:inline-block;background:var(--verde-pedra);color:var(--bruma);text-decoration:none;padding:16px 34px;border-radius:100px;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;transition:background .2s,transform .2s}
.btn:hover{background:var(--pedra-escura);transform:translateY(-2px)}
.ig{display:block;margin-top:26px;color:var(--verde-pedra);text-decoration:none;font-size:14px}
.rule{width:46px;height:3px;background:var(--areia);margin:0 auto 30px}
</style>
</head>
<body>
<div class="card">
  <div class="selo">Psicóloga clínica e do esporte</div>
  <h1>Pamella Braz</h1>
  <div class="sub">Terapia que cuida da raiz, não só do barulho.</div>
  <div class="crp">EMDR · CRP 18/02439</div>
  <div class="rule"></div>
  <a class="btn" href="/lesoes">Conheça: A Psicologia nas Lesões</a>
  <a class="ig" href="https://instagram.com/psicologa.pamellabraz" target="_blank" rel="noopener">@psicologa.pamellabraz</a>
</div>
</body>
</html>
